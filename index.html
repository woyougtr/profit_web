<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电商利润记录</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- 登录注册页面 -->
    <div id="auth-page" class="page">
      <div class="auth-container">
        <h1>💰 电商利润记录</h1>
        <div class="auth-tabs">
          <button class="tab-btn active" data-tab="login">登录</button>
          <button class="tab-btn" data-tab="register">注册</button>
        </div>
        
        <!-- 登录表单 -->
        <form id="login-form" class="auth-form">
          <input type="email" id="login-email" placeholder="邮箱" required>
          <input type="password" id="login-password" placeholder="密码" required>
          <button type="submit">登录</button>
        </form>
        
        <!-- 注册表单 -->
        <form id="register-form" class="auth-form" style="display:none;">
          <input type="email" id="register-email" placeholder="邮箱" required>
          <input type="password" id="register-password" placeholder="密码（至少6位）" required minlength="6">
          <button type="submit">注册</button>
        </form>
        
        <p id="auth-error" class="error"></p>
      </div>
    </div>

    <!-- 主页面 -->
    <div id="main-page" class="page" style="display:none;">
      <header>
        <h1>💰 电商利润记录</h1>
        <div class="user-info">
          <span id="user-email"></span>
          <button id="logout-btn">退出</button>
        </div>
      </header>

      <main>
        <!-- 利润计算器 -->
        <section class="calculator">
          <h2>利润计算器</h2>
          
          <!-- 汇率显示 -->
          <div class="rate-display">
            <span>汇率: 1 USD = </span>
            <input type="number" id="exchange-rate" value="7.24" step="0.0001">
            <span> CNY</span>
          </div>

          <!-- 利润预览 -->
          <div class="profit-preview" id="profit-preview">
            <span>预计利润</span>
            <span id="profit-amount" class="profit-value">¥0.00</span>
          </div>

          <!-- 输入表单 -->
          <div class="input-group">
            <div class="input-row">
              <label>售价</label>
              <input type="number" id="sale-price" step="0.01" placeholder="0">
              <select id="sale-currency">
                <option value="USD">$ USD</option>
                <option value="CNY">¥ CNY</option>
              </select>
            </div>

            <div class="input-row">
              <label>平台补贴</label>
              <input type="number" id="subsidy" step="0.01" placeholder="0">
              <select id="subsidy-currency">
                <option value="USD">$ USD</option>
                <option value="CNY">¥ CNY</option>
              </select>
            </div>

            <div class="input-row">
              <label>货物成本</label>
              <input type="number" id="cost" step="0.01" placeholder="0">
              <select id="cost-currency">
                <option value="CNY">¥ CNY</option>
                <option value="USD">$ USD</option>
              </select>
            </div>

            <div class="input-row">
              <label>头程运费</label>
              <input type="number" id="first-shipping" step="0.01" placeholder="0">
              <select id="first-shipping-currency">
                <option value="CNY">¥ CNY</option>
                <option value="USD">$ USD</option>
              </select>
            </div>

            <div class="input-row">
              <label>尾程运费</label>
              <input type="number" id="last-shipping" step="0.01" placeholder="0">
              <select id="last-shipping-currency">
                <option value="USD">$ USD</option>
                <option value="CNY">¥ CNY</option>
              </select>
            </div>

            <div class="input-row">
              <label>备注</label>
              <input type="text" id="note" placeholder="选填">
            </div>
          </div>

          <button id="save-btn" class="save-btn">保存记录</button>
          <input type="hidden" id="edit-id" value="">
        </section>

        <!-- 日历和统计 -->
        <section class="calendar-section">
          <div class="section-header">
            <h2>利润日历</h2>
            <div class="header-actions">
              <button id="toggle-chart-btn" class="icon-btn" title="趋势图">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
              </button>
            </div>
          </div>
          <div class="calendar-header">
            <button id="prev-month">&lt;</button>
            <span id="current-month"></span>
            <button id="next-month">&gt;</button>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
          
          <!-- 月度对比 -->
  <div class="compare-section" id="compare-section" style="display:none;">
    <div class="compare-card">
      <div class="compare-label">本月 vs 上月</div>
      <div class="compare-value" id="compare-value">--</div>
      <div class="compare-bar">
        <div class="compare-bar-fill" id="compare-bar-fill"></div>
      </div>
    </div>
  </div>

  <div class="month-stats" id="month-stats">
            <div class="stat-item">
              <span>本月利润</span>
              <span id="month-profit">¥0.00</span>
            </div>
            <div class="stat-item">
              <span>记录条数</span>
              <span id="month-count">0</span>
            </div>
          </div>
        </section>

        <!-- 历史记录 -->
        <section class="history-section">
          <div class="section-header">
            <h2 id="history-title">最近记录</h2>
            <div class="header-actions">
              <div class="dropdown">
                <button id="export-btn" class="icon-btn">📤</button>
                <div id="export-menu" class="dropdown-menu" style="display:none;">
                  <button data-range="current">本月数据</button>
                  <button data-range="last">上月数据</button>
                  <button data-range="custom" id="export-custom">自定义范围</button>
                </div>
              </div>
            </div>
          </div>
          <div id="history-list" class="history-list"></div>
        </section>
      </main>
    </div>
  </div>

  <!-- 图表弹窗 -->
  <div id="chart-modal" class="modal" style="display:none;">
    <div class="modal-content chart-modal-content">
      <div class="modal-header">
        <h3>利润趋势图</h3>
        <button class="modal-close" onclick="closeChartModal()">&times;</button>
      </div>
      <div class="modal-body">
        <canvas id="profit-chart"></canvas>
      </div>
    </div>
  </div>

  <!-- 导出日期选择弹窗 -->
  <div id="export-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>选择导出范围</h3>
        <button class="modal-close" onclick="closeExportModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="date-range-picker">
          <div class="date-input">
            <label>开始日期</label>
            <input type="date" id="export-start">
          </div>
          <div class="date-input">
            <label>结束日期</label>
            <input type="date" id="export-end">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-cancel" onclick="closeExportModal()">取消</button>
        <button class="modal-save" onclick="confirmExport()">导出</button>
      </div>
    </div>
  </div>

  <!-- 编辑弹窗 -->
  <div id="edit-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>编辑记录</h3>
        <button class="modal-close" onclick="closeEditModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-amount">
          <label>金额 (¥)</label>
          <input type="number" id="edit-amount" step="0.01" placeholder="0">
        </div>
        <div class="modal-note">
          <label>备注</label>
          <textarea id="edit-note" placeholder="选填" rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-cancel" onclick="closeEditModal()">取消</button>
        <button class="modal-save" onclick="submitEdit()">保存</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
